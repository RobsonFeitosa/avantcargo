version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-avantcargo
    restart: always
    env_file: 
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: api-avantcargo
    restart: always
    env_file: 
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    expose:
      - "3333"
    # MUDANÇA 1: Adiciona o volume que aponta para a pasta física de uploads
    volumes:
      - api_uploads:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./web
    container_name: web-avantcargo
    restart: always
    env_file: 
      - .env
    expose:
      - "3333"
    depends_on:
      - api

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web 

volumes:
  postgres_data:
  # MUDANÇA 2: Declara o volume global para o Docker gerenciar
  api_uploads: