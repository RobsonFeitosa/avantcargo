version: '3.8'

services:
  # Banco de Dados
  postgres:
    image: postgres:16-alpine
    container_name: postgres-avantcargo
    restart: always
    env_file:
      - .env
    # Porta 5432 exposta apenas para você gerenciar o banco da sua IDE se precisar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (API)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-avantcargo
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    # Sem 'ports' externos aqui para segurança, o Nginx faz a ponte
    expose:
      - "3333"
    volumes:
      - ./api:/app
      - /app/node_modules
    command: sh -c "yarn typeorm:cli migration:run && yarn dev"
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Web)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web-avantcargo
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  # Proxy Reverso (Nginx) - A Porta de Entrada
  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80" # Acessível via IP Externo da VM
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data: