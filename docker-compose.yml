version: '3.8'

services:
  # Banco de Dados
  postgres:
    image: postgres:16-alpine
    container_name: postgres-avantcargo
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # Healthcheck garante que a API só conecte quando o banco estiver pronto pra receber conexões
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (API)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-avantcargo
    restart: always
    env_file:
      - .env
    environment:
      # Aqui nós sobrescrevemos a URL do banco apenas DENTRO do container, 
      # apontando para o serviço 'postgres' criado acima, em vez de localhost.
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    ports:
      - "3333:3333"
    volumes:
      # Monta a pasta local na pasta /app do container (Live Reload)
      - ./api:/app
      # Evita que os node_modules do seu Windows sobrescrevam os instalados no container Linux
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Web)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web-avantcargo
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data: