version: '3.8'

services:
  # Banco de Dados
  postgres:
    image: postgres:16-alpine
    container_name: postgres-avantcargo
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # REMOVIDO: O init.sql foi removido daqui para evitar que ele tente popular 
      # tabelas que ainda não foram criadas pelas migrations da API.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (API)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-avantcargo
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    ports:
      - "3333:3333"
    volumes:
      - ./api:/app
      - /app/node_modules
    # A API agora é a "Dona" da estrutura do banco.
    # Ela cria as tabelas primeiro e depois inicia o servidor.
    command: sh -c "yarn typeorm:cli migration:run && yarn dev"
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Web)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web-avantcargo
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3333"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data: