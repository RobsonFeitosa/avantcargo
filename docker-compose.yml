version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-avantcargo
    restart: always
    env_file: 
      
        - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: api-avantcargo
    restart: always
    env_file: 
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    expose:
      - "3333"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./web
    container_name: web-avantcargo
    restart: always
    env_file: 
      - .env
    expose:
      - "3000"
    depends_on:
      - api

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  seed:
    image: postgres:16-alpine
    container_name: seed-avantcargo
    env_file: 
      - .env
    volumes:
      - ./init.sql:/init.sql
    command: >
      sh -c "
      until PGPASSWORD=$${POSTGRES_PASSWORD} psql -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1 FROM migrations LIMIT 1;' > /dev/null 2>&1; do
        echo 'Aguardando as migrations...';
        sleep 2;
      done;
      PGPASSWORD=$${POSTGRES_PASSWORD} psql -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} -f /init.sql;
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: