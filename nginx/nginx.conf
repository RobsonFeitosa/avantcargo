server {
    listen 80;
    server_name _;

    # Frontend (Next.js)
    location / {
        # O Nginx procura pelo 'container_name' na porta que o Next subiu
        proxy_pass http://web-avantcargo:3333; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend (NestJS)
    location /api/ {
        proxy_pass http://api-avantcargo:3333/; # COM BARRA NO FINAL
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # REMOVA O COMENTÁRIO ABAIXO (DEIXE A LINHA ATIVA)
        rewrite ^/api/(.*)$ /$1 break;
    }
}