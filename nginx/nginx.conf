 
server {
    listen 80;
    server_name www.avantcargo.com.br avantcargo.com.br;
    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl;
    server_name www.avantcargo.com.br avantcargo.com.br;

    
    ssl_certificate /etc/letsencrypt/live/avantcargo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avantcargo.com.br/privkey.pem;

    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    
    location / {
        proxy_pass http://web-avantcargo:3333; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    
    location /api {
        proxy_pass http://api-avantcargo:3333;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}